<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mausam Batao</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: white;
      position: relative;
      overflow-x: hidden;
    }

    /* Background image with dark overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url('bg.avif') no-repeat center center / cover;
      z-index: -2;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(5, 10, 25, 0.55) 0%,
        rgba(5, 10, 25, 0.70) 100%
      );
      z-index: -1;
    }

    /* Snowfall effect */
    .snow-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .snowflake {
      position: absolute;
      top: -10px;
      color: white;
      font-size: 1em;
      opacity: 0.7;
      animation: snowfall linear infinite;
      user-select: none;
    }

    @keyframes snowfall {
      0%   { transform: translateY(-10px) rotate(0deg);   opacity: 0.8; }
      100% { transform: translateY(105vh) rotate(360deg); opacity: 0.1; }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 28px;
      padding: 36px 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.55);
      text-align: center;
    }

    .app-title {
      font-size: clamp(1.6rem, 6vw, 2.2rem);
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 4px;
      background: linear-gradient(90deg, #e0eafc, #cfdef3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .app-subtitle {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 28px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    /* Search */
    .search-wrap {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 50px;
      padding: 4px 4px 4px 18px;
      margin-bottom: 14px;
      transition: border 0.3s, box-shadow 0.3s;
    }

    .search-wrap:focus-within {
      border-color: rgba(200, 220, 255, 0.6);
      box-shadow: 0 0 0 3px rgba(200, 220, 255, 0.12);
    }

    .search-wrap input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: white;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      padding: 8px 0;
    }

    .search-wrap input::placeholder { color: rgba(255,255,255,0.38); }

    .mic-btn {
      background: rgba(255,255,255,0.12);
      border: none;
      border-radius: 50%;
      width: 38px; height: 38px;
      font-size: 17px;
      cursor: pointer;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .mic-btn:hover, .mic-btn.listening {
      background: rgba(200, 220, 255, 0.3);
    }

    .search-btn {
      width: 100%;
      padding: 13px;
      border-radius: 50px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      background: linear-gradient(135deg, #c9d6ff, #e2e2e2);
      color: #1a1a2e;
      letter-spacing: 0.5px;
      transition: transform 0.2s, box-shadow 0.2s;
      touch-action: manipulation;
    }

    .search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(200, 214, 255, 0.3);
    }

    .search-btn:active { transform: translateY(0); }

    /* Loader */
    .loader {
      display: none;
      margin: 24px auto 0;
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #c9d6ff;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      color: #ff8a8a;
      font-size: 0.83rem;
      margin-top: 10px;
      min-height: 18px;
    }

    /* Weather box */
    .weather-box {
      display: none;
      margin-top: 22px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 22px 18px;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .city-name {
      font-size: clamp(1.1rem, 5vw, 1.4rem);
      font-weight: 700;
      color: #fff;
    }

    .weather-date {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.38);
      margin-bottom: 10px;
    }

    .weather-icon {
      width: 88px; height: 88px;
      filter: drop-shadow(0 4px 14px rgba(200,214,255,0.45));
    }

    .temp-main {
      font-size: clamp(2.8rem, 12vw, 4rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, #e0eafc, #cfdef3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .weather-desc {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.55);
      text-transform: capitalize;
      margin: 6px 0 18px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 13px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .stat-icon { font-size: 1.3rem; }

    .stat-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: #c9d6ff;
    }

    .stat-label {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.38);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Recent chips */
    .recent-wrap { margin-top: 18px; }

    .recent-label {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.32);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
    }

    .chip {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 50px;
      padding: 5px 13px;
      font-size: 0.76rem;
      cursor: pointer;
      color: rgba(255,255,255,0.7);
      transition: all 0.2s;
      touch-action: manipulation;
    }

    .chip:hover, .chip:active {
      background: rgba(200, 214, 255, 0.2);
      border-color: #c9d6ff;
      color: #c9d6ff;
    }

    @media (max-width: 380px) {
      .card { padding: 26px 16px; }
    }
  </style>
</head>
<body>

  <!-- CSS Snowfall -->
  <div class="snow-container" id="snowContainer"></div>

  <div class="card">
    <div class="app-title">🌨 Mausam Batao</div>
    <div class="app-subtitle">Live Weather Updates</div>

    <div class="search-wrap">
      <input type="text" id="cityInput" placeholder="Search city..." />
      <button class="mic-btn" id="micBtn" onclick="startVoiceInput()" aria-label="Voice search">🎙</button>
    </div>

    <button class="search-btn" onclick="getWeather()">Get Weather</button>

    <div class="loader" id="loader"></div>
    <div class="error" id="error"></div>

    <div class="weather-box" id="weather">
      <div class="city-name" id="wCity"></div>
      <div class="weather-date" id="wDate"></div>
      <img class="weather-icon" id="wIcon" src="" alt="weather icon" />
      <div class="temp-main" id="wTemp"></div>
      <div class="weather-desc" id="wDesc"></div>
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-icon">💧</span>
          <span class="stat-value" id="wHumidity">--</span>
          <span class="stat-label">Humidity</span>
        </div>
        <div class="stat-card">
          <span class="stat-icon">💨</span>
          <span class="stat-value" id="wWind">--</span>
          <span class="stat-label">Wind</span>
        </div>
        <div class="stat-card">
          <span class="stat-icon">🌡️</span>
          <span class="stat-value" id="wFeels">--</span>
          <span class="stat-label">Feels Like</span>
        </div>
        <div class="stat-card">
          <span class="stat-icon">👁️</span>
          <span class="stat-value" id="wVis">--</span>
          <span class="stat-label">Visibility</span>
        </div>
      </div>
    </div>

    <div class="recent-wrap" id="recentWrap" style="display:none;">
      <div class="recent-label">Recent Searches</div>
      <div class="chips" id="chips"></div>
    </div>
  </div>

  <script>
    const API_KEY = "c1d578ffd4726b7a1f132420a359c542";
    const cityInput  = document.getElementById('cityInput');
    const weatherBox = document.getElementById('weather');
    const errorBox   = document.getElementById('error');
    const loader     = document.getElementById('loader');
    const micBtn     = document.getElementById('micBtn');

    // --- Snowfall generator ---
    (function createSnow() {
      const container = document.getElementById('snowContainer');
      const count = 55;
      for (let i = 0; i < count; i++) {
        const flake = document.createElement('div');
        flake.classList.add('snowflake');
        flake.textContent = '❄';
        flake.style.left        = Math.random() * 100 + 'vw';
        flake.style.fontSize    = (Math.random() * 14 + 8) + 'px';
        flake.style.opacity     = (Math.random() * 0.5 + 0.2).toFixed(2);
        flake.style.animationDuration  = (Math.random() * 8 + 5) + 's';
        flake.style.animationDelay     = (Math.random() * 10) + 's';
        container.appendChild(flake);
      }
    })();

    // Enter key
    cityInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') getWeather();
    });

    function getDateString() {
      return new Date().toLocaleDateString('en-IN', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    async function getWeather() {
      const city = cityInput.value.trim();
      if (!city) { showError("Please enter a city name!"); return; }
      await fetchCityWeather(city);
    }

    async function fetchCityWeather(city) {
      cityInput.value = city;
      weatherBox.style.display = "none";
      errorBox.textContent = "";
      loader.style.display = "block";

      try {
        const res = await fetch(
          `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`
        );
        if (!res.ok) throw new Error();
        const d = await res.json();

        document.getElementById('wCity').textContent     = `${d.name}, ${d.sys.country}`;
        document.getElementById('wDate').textContent     = getDateString();
        document.getElementById('wIcon').src             = `https://openweathermap.org/img/wn/${d.weather[0].icon}@2x.png`;
        document.getElementById('wTemp').textContent     = `${Math.round(d.main.temp)}°C`;
        document.getElementById('wDesc').textContent     = d.weather[0].description;
        document.getElementById('wHumidity').textContent = `${d.main.humidity}%`;
        document.getElementById('wWind').textContent     = `${d.wind.speed} m/s`;
        document.getElementById('wFeels').textContent    = `${Math.round(d.main.feels_like)}°C`;
        document.getElementById('wVis').textContent      = `${(d.visibility / 1000).toFixed(1)} km`;

        loader.style.display = "none";
        weatherBox.style.display = "block";
        saveCity(city);
      } catch {
        loader.style.display = "none";
        showError("City not found. Please try again.");
      }
    }

    function showError(msg) {
      errorBox.textContent = msg;
      setTimeout(() => errorBox.textContent = "", 3000);
    }

    function saveCity(city) {
      let cities = JSON.parse(localStorage.getItem("recentCities")) || [];
      cities = cities.filter(c => c.toLowerCase() !== city.toLowerCase());
      cities.unshift(city);
      if (cities.length > 6) cities.pop();
      localStorage.setItem("recentCities", JSON.stringify(cities));
      renderChips();
    }

    function renderChips() {
      const cities = JSON.parse(localStorage.getItem("recentCities")) || [];
      const wrap   = document.getElementById('recentWrap');
      const chips  = document.getElementById('chips');
      if (!cities.length) { wrap.style.display = 'none'; return; }
      wrap.style.display = 'block';
      chips.innerHTML = cities.map(c =>
        `<span class="chip" onclick="fetchCityWeather('${c}')">${c}</span>`
      ).join('');
    }

    function startVoiceInput() {
      if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        showError("Voice not supported in this browser.");
        return;
      }
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SR();
      recognition.lang = "en-IN";
      recognition.start();
      micBtn.classList.add('listening');
      recognition.onresult = e => {
        cityInput.value = e.results[0][0].transcript;
        micBtn.classList.remove('listening');
        getWeather();
      };
      recognition.onerror = () => micBtn.classList.remove('listening');
      recognition.onend   = () => micBtn.classList.remove('listening');
    }

    window.onload = renderChips;
  </script>
</body>
</html>
