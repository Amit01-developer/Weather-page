<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mausam Batao</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-size: 400% 400%;
      animation: bgShift 10s ease infinite;
      color: white;
    }

    @keyframes bgShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating bubbles background */
    .bubbles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .bubble {
      position: absolute;
      bottom: -100px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      animation: rise linear infinite;
    }

    .bubble:nth-child(1)  { width: 40px;  height: 40px;  left: 10%; animation-duration: 8s;  animation-delay: 0s; }
    .bubble:nth-child(2)  { width: 20px;  height: 20px;  left: 20%; animation-duration: 5s;  animation-delay: 2s; }
    .bubble:nth-child(3)  { width: 60px;  height: 60px;  left: 35%; animation-duration: 10s; animation-delay: 1s; }
    .bubble:nth-child(4)  { width: 80px;  height: 80px;  left: 50%; animation-duration: 7s;  animation-delay: 3s; }
    .bubble:nth-child(5)  { width: 25px;  height: 25px;  left: 65%; animation-duration: 6s;  animation-delay: 0s; }
    .bubble:nth-child(6)  { width: 50px;  height: 50px;  left: 80%; animation-duration: 9s;  animation-delay: 4s; }
    .bubble:nth-child(7)  { width: 15px;  height: 15px;  left: 90%; animation-duration: 4s;  animation-delay: 1s; }

    @keyframes rise {
      0%   { transform: translateY(0) scale(1);   opacity: 0.6; }
      100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 28px;
      padding: 36px 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    .app-title {
      font-size: clamp(1.6rem, 6vw, 2.2rem);
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 6px;
      background: linear-gradient(90deg, #a8edea, #fed6e3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .app-subtitle {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 28px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Search area */
    .search-wrap {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 4px 4px 4px 18px;
      margin-bottom: 16px;
      transition: border 0.3s;
    }

    .search-wrap:focus-within {
      border-color: #a8edea;
      box-shadow: 0 0 0 3px rgba(168, 237, 234, 0.15);
    }

    .search-wrap input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: white;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      padding: 8px 0;
    }

    .search-wrap input::placeholder {
      color: rgba(255,255,255,0.4);
    }

    .mic-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      font-size: 18px;
      cursor: pointer;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .mic-btn:hover, .mic-btn.listening {
      background: rgba(168, 237, 234, 0.3);
    }

    .search-btn {
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      background: linear-gradient(135deg, #a8edea, #fed6e3);
      color: #1a1a2e;
      letter-spacing: 0.5px;
      transition: transform 0.2s, box-shadow 0.2s;
      touch-action: manipulation;
    }

    .search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(168, 237, 234, 0.35);
    }

    .search-btn:active {
      transform: translateY(0);
    }

    /* Loader */
    .loader {
      display: none;
      margin: 24px auto 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #a8edea;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error */
    .error {
      color: #ff6b6b;
      font-size: 0.85rem;
      margin-top: 12px;
      min-height: 20px;
    }

    /* Weather result card */
    .weather-box {
      display: none;
      margin-top: 24px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 24px 20px;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .city-name {
      font-size: clamp(1.2rem, 5vw, 1.5rem);
      font-weight: 700;
      color: #fff;
    }

    .weather-date {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 12px;
    }

    .weather-icon {
      width: 90px;
      height: 90px;
      filter: drop-shadow(0 4px 12px rgba(168,237,234,0.4));
    }

    .temp-main {
      font-size: clamp(2.8rem, 12vw, 4rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, #a8edea, #fed6e3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .weather-desc {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.6);
      text-transform: capitalize;
      margin: 6px 0 20px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-card {
      background: rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 14px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .stat-icon { font-size: 1.4rem; }

    .stat-value {
      font-size: 1rem;
      font-weight: 600;
      color: #a8edea;
    }

    .stat-label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Recent cities */
    .recent-wrap {
      margin-top: 20px;
    }

    .recent-label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
          }

    .chip {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 0.78rem;
      cursor: pointer;
      color: rgba(255,255,255,0.75);
      transition: all 0.2s;
      touch-action: manipulation;
    }

    .chip:hover, .chip:active {
      background: rgba(168, 237, 234, 0.2);
      border-color: #a8edea;
      color: #a8edea;
    }

    /* Responsive tweaks */
    @media (max-width: 380px) {
      .card { padding: 28px 18px; }
      .stats-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    }
  </style>
</head>
<body>

  <!-- Floating bubbles -->
  <div class="bubbles">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>

  <div class="card">
    <div class="app-title">🌤 Mausam Batao</div>
    <div class="app-subtitle">Live Weather Updates</div>

    <div class="search-wrap">
      <input type="text" id="cityInput" placeholder="Search city..." />
      <button class="mic-btn" id="micBtn" onclick="startVoiceInput()" aria-label="Voice search">🎙</button>
    </div>

    <button class="search-btn" onclick="getWeather()">Get Weather</button>

    <div class="loader" id="loader"></div>
    <div class="error" id="error"></div>

    <div class="weather-box" id="weather">
      <div class="city-name" id="wCity"></div>
      <div class="weather-date" id="wDate"></div>
      <img class="weather-icon" id="wIcon" src="" alt="weather icon" />
      <div class="temp-main" id="wTemp"></div>
      <div class="weather-desc" id="wDesc"></div>
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-icon">💧</span>
          <span class="stat-value" id="wHumidity">--</span>
          <span class="stat-label">Humidity</span>
        </div>
        <div class="stat-card">
          <span class="stat-icon">💨</span>
          <span class="stat-value" id="wWind">--</span>
          <span class="stat-label">Wind</span>
        </div>
        <div class="stat-card">
          <span class="stat-icon">🌡️</span>
          <span class="stat-value" id="wFeels">--</span>
          <span class="stat-label">Feels Like</span>
        </div>
        <div class="stat-card">
          <span class="stat-icon">👁️</span>
          <span class="stat-value" id="wVis">--</span>
          <span class="stat-label">Visibility</span>
        </div>
      </div>
    </div>

    <div class="recent-wrap" id="recentWrap" style="display:none;">
      <div class="recent-label">Recent Searches</div>
      <div class="chips" id="chips"></div>
    </div>
  </div>

  <script>
    const API_KEY = "c1d578ffd4726b7a1f132420a359c542";

    const cityInput   = document.getElementById('cityInput');
    const weatherBox  = document.getElementById('weather');
    const errorBox    = document.getElementById('error');
    const loader      = document.getElementById('loader');
    const micBtn      = document.getElementById('micBtn');

    // Enter key support
    cityInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') getWeather();
    });

    function getDateString() {
      return new Date().toLocaleDateString('en-IN', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    async function getWeather() {
      const city = cityInput.value.trim();
      if (!city) {
        showError("Please enter a city name!");
        return;
      }
      await fetchCityWeather(city);
    }

    async function fetchCityWeather(city) {
      cityInput.value = city;
      weatherBox.style.display = "none";
      errorBox.textContent = "";
      loader.style.display = "block";

      try {
        const res = await fetch(
          `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`
        );
        if (!res.ok) throw new Error("Not found");
        const d = await res.json();

        document.getElementById('wCity').textContent    = `${d.name}, ${d.sys.country}`;
        document.getElementById('wDate').textContent    = getDateString();
        document.getElementById('wIcon').src            = `https://openweathermap.org/img/wn/${d.weather[0].icon}@2x.png`;
        document.getElementById('wTemp').textContent    = `${Math.round(d.main.temp)}°C`;
        document.getElementById('wDesc').textContent    = d.weather[0].description;
        document.getElementById('wHumidity').textContent = `${d.main.humidity}%`;
        document.getElementById('wWind').textContent    = `${d.wind.speed} m/s`;
        document.getElementById('wFeels').textContent   = `${Math.round(d.main.feels_like)}°C`;
        document.getElementById('wVis').textContent     = `${(d.visibility / 1000).toFixed(1)} km`;

        loader.style.display = "none";
        weatherBox.style.display = "block";
        saveCity(city);
      } catch {
        loader.style.display = "none";
        showError("City not found. Please try again.");
      }
    }

    function showError(msg) {
      errorBox.textContent = msg;
      setTimeout(() => errorBox.textContent = "", 3000);
    }

    function saveCity(city) {
      let cities = JSON.parse(localStorage.getItem("recentCities")) || [];
      cities = cities.filter(c => c.toLowerCase() !== city.toLowerCase());
      cities.unshift(city);
      if (cities.length > 6) cities.pop();
      localStorage.setItem("recentCities", JSON.stringify(cities));
      renderChips();
    }

    function renderChips() {
      const cities = JSON.parse(localStorage.getItem("recentCities")) || [];
      const wrap   = document.getElementById('recentWrap');
      const chips  = document.getElementById('chips');
      if (!cities.length) { wrap.style.display = 'none'; return; }
      wrap.style.display = 'block';
      chips.innerHTML = cities.map(c =>
        `<span class="chip" onclick="fetchCityWeather('${c}')">${c}</span>`
      ).join('');
    }

    function startVoiceInput() {
      if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        showError("Voice not supported in this browser.");
        return;
      }
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SR();
      recognition.lang = "en-IN";
      recognition.start();
      micBtn.classList.add('listening');

      recognition.onresult = e => {
        cityInput.value = e.results[0][0].transcript;
        micBtn.classList.remove('listening');
        getWeather();
      };
      recognition.onerror = () => micBtn.classList.remove('listening');
      recognition.onend   = () => micBtn.classList.remove('listening');
    }

    window.onload = renderChips;
  </script>
</body>
</html>
